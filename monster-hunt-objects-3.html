<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Monster Hunt — Hiding Spots</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@600;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{height:100%;overflow:hidden;font-family:'Fredoka',sans-serif;background:#160d33;}
  #cam{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;}
  #scene{position:fixed;inset:0;z-index:1;pointer-events:none;}
  #scene .monster{pointer-events:none;}

  #start{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px;
    background:radial-gradient(circle at 30% 20%,#ff9ed8 0%,transparent 55%),radial-gradient(circle at 75% 70%,#9b7bff 0%,transparent 55%),linear-gradient(160deg,#2a1a52,#160d33);}
  #start h1{font-family:'Baloo 2',cursive;font-weight:800;font-size:clamp(34px,11vw,64px);color:#fff;line-height:1;text-shadow:0 4px 0 #6a3cc4,0 8px 18px rgba(0,0,0,.4);margin-bottom:14px;}
  #start p{color:#ffe7fb;font-size:clamp(15px,4.3vw,21px);max-width:340px;margin-bottom:34px;font-weight:500;line-height:1.45;}
  .emoji-row{font-size:clamp(40px,13vw,64px);margin-bottom:24px;letter-spacing:6px;}
  .emoji-row span{display:inline-block;animation:bob 2.2s ease-in-out infinite;}
  .emoji-row span:nth-child(2){animation-delay:.3s}.emoji-row span:nth-child(3){animation-delay:.6s}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-14px) rotate(4deg)}}
  .bigbtn{font-family:'Baloo 2',cursive;font-weight:800;font-size:clamp(20px,6vw,28px);color:#fff;background:linear-gradient(#ff6fb5,#ff3d96);border:none;border-radius:60px;padding:18px 50px;box-shadow:0 8px 0 #c41e6f,0 14px 26px rgba(0,0,0,.4);cursor:pointer;transition:transform .12s,box-shadow .12s;}
  .bigbtn:active{transform:translateY(6px);box-shadow:0 2px 0 #c41e6f,0 6px 14px rgba(0,0,0,.4);}
  .bigbtn[disabled]{opacity:.6;filter:grayscale(.3);}

  #hud{position:fixed;top:0;left:0;right:0;z-index:30;display:none;align-items:center;justify-content:space-between;padding:16px 20px;pointer-events:none;}
  #score{font-family:'Baloo 2',cursive;font-weight:800;color:#fff;font-size:24px;background:rgba(106,60,196,.65);backdrop-filter:blur(6px);padding:8px 20px;border-radius:40px;box-shadow:0 4px 12px rgba(0,0,0,.3);display:flex;align-items:center;gap:8px;}
  #hint{position:fixed;bottom:34px;left:50%;transform:translateX(-50%);z-index:30;font-family:'Baloo 2',cursive;font-weight:800;color:#fff;font-size:21px;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);padding:12px 24px;border-radius:40px;display:none;text-align:center;pointer-events:none;max-width:90vw;}

  .monster{position:fixed;z-index:20;width:120px;height:120px;will-change:transform,left,top;
    transition:left .25s linear,top .25s linear;}
  .monster .body{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:96px;filter:drop-shadow(0 6px 10px rgba(0,0,0,.55));}
  /* peek: start tucked low behind the object, rise up when revealed */
  .monster .body{transform:translateY(46%) scale(.9);opacity:.92;transition:transform .5s cubic-bezier(.34,1.3,.5,1);}
  .monster.out .body{transform:translateY(-8%) scale(1);}
  .monster.found .body{animation:caught .7s ease forwards;}
  @keyframes caught{0%{transform:scale(1)}30%{transform:scale(1.5) rotate(-12deg)}60%{transform:scale(1.3) rotate(12deg)}100%{transform:scale(0) rotate(40deg)}}

  .spark{position:fixed;z-index:25;font-size:40px;pointer-events:none;animation:fly .8s ease forwards;}
  @keyframes fly{0%{transform:translate(0,0) scale(.4);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(1.4);opacity:0}}
  #yay{position:fixed;top:42%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:40;font-family:'Baloo 2',cursive;font-weight:800;font-size:60px;color:#fff;text-shadow:0 4px 0 #ff3d96,0 8px 20px rgba(0,0,0,.5);pointer-events:none;}
  #yay.show{animation:yay 1.1s ease forwards;}
  @keyframes yay{0%{transform:translate(-50%,-50%) scale(0) rotate(-15deg);opacity:0}35%{transform:translate(-50%,-50%) scale(1.25) rotate(8deg);opacity:1}70%{transform:translate(-50%,-50%) scale(1) rotate(-4deg);opacity:1}100%{transform:translate(-50%,-50%) scale(1.1);opacity:0}}

  #loading{position:fixed;inset:0;z-index:45;display:none;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#2a1a52,#160d33);color:#fff;text-align:center;padding:40px;}
  #loading .spin{font-size:64px;animation:spin 1.4s linear infinite;margin-bottom:20px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  #loading p{font-family:'Baloo 2';font-size:22px;}

  #err{position:fixed;inset:0;z-index:60;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;background:linear-gradient(160deg,#2a1a52,#160d33);color:#fff;}
  #err h2{font-family:'Baloo 2';font-size:28px;margin-bottom:14px;}
  #err p{font-size:17px;max-width:330px;line-height:1.5;color:#ffe7fb;}
</style>
</head>
<body>
<video id="cam" autoplay playsinline muted></video>
<div id="scene"></div>

<div id="hud"><div id="score">⭐ <span id="scoreNum">0</span></div></div>
<div id="hint"></div>
<div id="yay">YAY! 🎉</div>

<div id="start">
  <div class="emoji-row"><span>🐉</span><span>🛋️</span><span>👾</span></div>
  <h1>Monster Hunt</h1>
  <p>Monsters hide behind real things — chairs, sofas, beds! Point the camera around the room to find one peeking out, then tap the screen to catch it. 🫣</p>
  <button class="bigbtn" id="go">Let's Play!</button>
</div>

<div id="loading"><div class="spin">🔍</div><p id="loadmsg">Waking up the monsters…</p></div>

<div id="err"><h2>Hmm… 📷</h2><p id="errmsg">This game needs the camera. Please allow camera access and reload.</p></div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<script>
const video=document.getElementById('cam');
const scene=document.getElementById('scene');
const hint=document.getElementById('hint');
const yay=document.getElementById('yay');
const scoreNum=document.getElementById('scoreNum');
let score=0;

// objects we treat as valid "hiding spots"
const HIDE_SPOTS=['chair','couch','sofa','bed','dining table','tv','laptop','potted plant',
  'bench','toilet','sink','refrigerator','oven','suitcase','backpack','teddy bear','book','vase','bowl'];
const FRIENDLY={couch:'sofa','dining table':'table','tv':'TV','potted plant':'plant','teddy bear':'teddy'};
const MONSTERS=['🐉','🦖','🦕','🐙','🦑','🐡','👾','👻','👽','🤖','🐲','🦎','🐊','🦀'];

let actx;
function beep(f,d,t='sine',v=0.25){try{if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator(),g=actx.createGain();o.type=t;o.frequency.value=f;o.connect(g);g.connect(actx.destination);g.gain.setValueAtTime(v,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+d);o.start();o.stop(actx.currentTime+d);}catch(e){}}
function peekSound(){beep(520,0.12,'triangle',0.18);}
function foundSound(){beep(660,0.12,'sine',0.3);setTimeout(()=>beep(880,0.12,'sine',0.3),120);setTimeout(()=>beep(1175,0.22,'sine',0.3),240);}
function rand(a,b){return a+Math.random()*(b-a);}

let model=null, current=null, detecting=false;
let cooldownUntil=0;          // don't spawn the next monster until this time
let foundThisRound=0;         // how many caught in the current round
const PER_ROUND=2;            // find this many before a rest
let resting=false;            // true during the between-rounds pause
let lastRect=null;            // where the last monster was caught (avoid reusing)

document.getElementById('go').addEventListener('click', startGame);

async function startGame(){
  // camera first
  let stream;
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false});
  }catch(e){
    document.getElementById('start').style.display='none';
    document.getElementById('err').style.display='flex';
    if(location.protocol!=='https:'&&location.hostname!=='localhost'){
      document.getElementById('errmsg').textContent='The camera only works on a secure (https) page. Open this through your https link.';
    }
    return;
  }
  video.srcObject=stream;
  await new Promise(r=>{ if(video.readyState>=2) r(); else video.onloadedmetadata=()=>r(); });

  document.getElementById('start').style.display='none';
  document.getElementById('loading').style.display='flex';
  beep(440,0.05,'sine',0.05);

  // load the detection model (this is the heavy bit, ~few seconds first time)
  try{
    model=await cocoSsd.load({base:'lite_mobilenet_v2'});
  }catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('err').style.display='flex';
    document.getElementById('errmsg').textContent='Could not load the monster detector. Check your internet connection and reload.';
    return;
  }

  document.getElementById('loading').style.display='none';
  document.getElementById('hud').style.display='flex';
  hint.style.display='block';
  hint.textContent='Point at a chair or sofa… 👀';

  // tap anywhere to catch a revealed monster
  const tapCatch=(ev)=>{ if(current&&current.state==='out'&&!current.caught){ if(ev)ev.preventDefault(); current.caught=true; found(current);} };
  document.body.addEventListener('pointerdown',tapCatch);
  document.body.addEventListener('touchstart',tapCatch,{passive:false});

  detectLoop();
}

// map a detection bbox (video coords) to screen coords, accounting for object-fit:cover
function videoToScreen(bbox){
  const vw=video.videoWidth, vh=video.videoHeight;
  const sw=window.innerWidth, sh=window.innerHeight;
  const scale=Math.max(sw/vw, sh/vh);            // cover
  const dw=vw*scale, dh=vh*scale;
  const ox=(sw-dw)/2, oy=(sh-dh)/2;
  const [x,y,w,h]=bbox;
  return { x:x*scale+ox, y:y*scale+oy, w:w*scale, h:h*scale };
}

function iou(a,b){
  const x1=Math.max(a.x,b.x), y1=Math.max(a.y,b.y);
  const x2=Math.min(a.x+a.w,b.x+b.w), y2=Math.min(a.y+a.h,b.y+b.h);
  const iw=Math.max(0,x2-x1), ih=Math.max(0,y2-y1);
  const inter=iw*ih, uni=a.w*a.h+b.w*b.h-inter;
  return uni<=0?0:inter/uni;
}

async function detectLoop(){
  if(detecting){ requestAnimationFrame(detectLoop); return; }
  detecting=true;
  let preds=[];
  try{ preds=await model.detect(video, 10); }catch(e){}
  detecting=false;

  // valid hiding spots on screen now
  const spots=preds
    .filter(p=>p.score>0.45 && HIDE_SPOTS.includes(p.class))
    .map(p=>({rect:videoToScreen(p.bbox), cls:p.class}));

  if(current && !current.caught){
    // try to keep the monster on its object: find best-overlapping current spot
    let best=null, bestI=0;
    for(const s of spots){ const i=iou(s.rect,current.rect); if(i>bestI){bestI=i;best=s;} }
    if(best && bestI>0.15){
      current.rect=best.rect; current.missed=0;
      placeMonster(current);
      if(current.state!=='out'){ reveal(current); }
    }else{
      // lost sight of the object
      current.missed=(current.missed||0)+1;
      if(current.missed>14){ // gone for a while -> tuck away and clear
        despawn(current); current=null;
      }else if(current.state==='out'){
        // briefly keep showing at last spot so a wobble doesn't yank it away
        placeMonster(current);
      }
    }
    hint.textContent = current && current.state==='out' ? 'There it is! Tap the screen! 👆' : 'Keep looking… 👀';
  }else if(!current){
    // hold off if we're resting between rounds or in a post-catch cooldown
    if(resting){
      // wait; the rest timer will clear this
    }else if(performance.now() < cooldownUntil){
      hint.textContent='Look around… 👀';
    }else if(spots.length){
      // prefer a spot that ISN'T the one she just cleared, so she has to look elsewhere
      let choices=spots;
      if(lastRect){
        const fresh=spots.filter(s=>iou(s.rect,lastRect)<0.3);
        if(fresh.length) choices=fresh;
        else { hint.textContent='Look for a different hiding spot! 🔄'; requestAnimationFrame(detectLoop); return; }
      }
      const s=choices[Math.floor(Math.random()*choices.length)];
      spawnOn(s);
    }else{
      hint.textContent='Point at a chair, sofa or bed… 👀';
    }
  }

  requestAnimationFrame(detectLoop);
}

function spawnOn(spot){
  const emoji=MONSTERS[Math.floor(Math.random()*MONSTERS.length)];
  const el=document.createElement('div');
  el.className='monster';
  el.innerHTML=`<div class="body">${emoji}</div>`;
  scene.appendChild(el);
  current={el,rect:spot.rect,cls:spot.cls,state:'hidden',caught:false,missed:0};
  placeMonster(current);
  // reveal almost immediately — being pointed at the object IS the discovery
  setTimeout(()=>{ if(current&&!current.caught&&current.state==='hidden') reveal(current); }, 250);
}

function placeMonster(mon){
  const r=mon.rect, size=Math.min(140,Math.max(80,r.w*0.5));
  mon.el.style.width=size+'px'; mon.el.style.height=size+'px';
  // sit the monster at the top-center of the object, peeking up from behind it
  mon.el.style.left=(r.x+r.w/2-size/2)+'px';
  mon.el.style.top =(r.y-size*0.35)+'px';
}

function reveal(mon){
  if(mon.state==='out')return;
  mon.state='out'; mon.el.classList.add('out'); peekSound();
  const name=FRIENDLY[mon.cls]||mon.cls;
  hint.textContent=`Found one behind the ${name}! Tap! 👆`;
}

function despawn(mon){
  mon.el.classList.remove('out');
  const el=mon.el;
  setTimeout(()=>el.remove(),400);
}

function found(mon){
  foundSound();
  mon.el.querySelector('.body').classList.add('found');
  const r=mon.el.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+r.height/2;
  for(let i=0;i<8;i++){const s=document.createElement('div');s.className='spark';s.textContent=['✨','⭐','💫','🌟'][i%4];const a=(Math.PI*2/8)*i,d=90+Math.random()*40;s.style.left=cx+'px';s.style.top=cy+'px';s.style.setProperty('--dx',(Math.cos(a)*d)+'px');s.style.setProperty('--dy',(Math.sin(a)*d)+'px');scene.appendChild(s);setTimeout(()=>s.remove(),800);}
  score++; scoreNum.textContent=score;
  foundThisRound++;
  lastRect=mon.rect; // remember this spot to avoid immediate reuse
  const el=mon.el;
  setTimeout(()=>{ el.remove(); }, 800);
  current=null;

  if(foundThisRound>=PER_ROUND){
    // round complete — bigger celebration, then a short rest before more
    foundThisRound=0;
    resting=true;
    yay.textContent='WOW! All found! 🎉🌈';
    yay.classList.remove('show');void yay.offsetWidth;yay.classList.add('show');
    hint.textContent='Great job! More monsters coming… 💫';
    beep(784,0.15,'sine',0.3);setTimeout(()=>beep(988,0.15,'sine',0.3),150);setTimeout(()=>beep(1319,0.25,'sine',0.3),300);
    setTimeout(()=>{ resting=false; cooldownUntil=performance.now(); lastRect=null; }, 3500);
  }else{
    // caught one, brief beat before the next hides
    yay.textContent=['YAY! 🎉','Got it! 🌈','Wheee! ⭐','Found you! 💖'][Math.floor(Math.random()*4)];
    yay.classList.remove('show');void yay.offsetWidth;yay.classList.add('show');
    hint.textContent='One more to find! 🔎';
    cooldownUntil=performance.now()+2200; // pause before next monster appears
  }
}
</script>
</body>
</html>
