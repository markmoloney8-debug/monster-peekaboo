<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Monster Peekaboo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@600;800&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html, body { height:100%; overflow:hidden; font-family:'Fredoka',sans-serif; background:#1a1230; }

  #cam {
    position:fixed; inset:0; width:100%; height:100%;
    object-fit:cover; z-index:0; transform:scaleX(1);
  }

  /* dim/warm overlay so monsters pop */
  #scene { position:fixed; inset:0; z-index:1; pointer-events:none; }

  /* ---------- Start screen ---------- */
  #start {
    position:fixed; inset:0; z-index:50;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:32px;
    background:
      radial-gradient(circle at 30% 20%, #ff9ed8 0%, transparent 55%),
      radial-gradient(circle at 75% 70%, #9b7bff 0%, transparent 55%),
      linear-gradient(160deg,#2a1a52,#160d33);
  }
  #start h1 {
    font-family:'Baloo 2',cursive; font-weight:800; font-size:clamp(38px,12vw,72px);
    color:#fff; line-height:1; text-shadow:0 4px 0 #6a3cc4, 0 8px 18px rgba(0,0,0,.4);
    margin-bottom:14px;
  }
  #start p { color:#ffe7fb; font-size:clamp(16px,4.5vw,22px); max-width:340px; margin-bottom:38px; font-weight:500; }
  .emoji-row { font-size:clamp(40px,13vw,68px); margin-bottom:28px; letter-spacing:6px; }
  .emoji-row span { display:inline-block; animation:bob 2.2s ease-in-out infinite; }
  .emoji-row span:nth-child(2){ animation-delay:.3s }
  .emoji-row span:nth-child(3){ animation-delay:.6s }
  .emoji-row span:nth-child(4){ animation-delay:.9s }
  @keyframes bob { 0%,100%{transform:translateY(0) rotate(-4deg)} 50%{transform:translateY(-16px) rotate(4deg)} }

  .bigbtn {
    font-family:'Baloo 2',cursive; font-weight:800; font-size:clamp(22px,6vw,30px);
    color:#fff; background:linear-gradient(#ff6fb5,#ff3d96);
    border:none; border-radius:60px; padding:20px 54px;
    box-shadow:0 8px 0 #c41e6f, 0 14px 26px rgba(0,0,0,.4);
    cursor:pointer; transition:transform .12s, box-shadow .12s;
  }
  .bigbtn:active { transform:translateY(6px); box-shadow:0 2px 0 #c41e6f, 0 6px 14px rgba(0,0,0,.4); }

  /* ---------- HUD ---------- */
  #hud {
    position:fixed; top:0; left:0; right:0; z-index:30;
    display:none; align-items:center; justify-content:space-between;
    padding:16px 20px; pointer-events:none;
  }
  #score {
    font-family:'Baloo 2',cursive; font-weight:800; color:#fff;
    font-size:24px; background:rgba(106,60,196,.65); backdrop-filter:blur(6px);
    padding:8px 20px; border-radius:40px; box-shadow:0 4px 12px rgba(0,0,0,.3);
    display:flex; align-items:center; gap:8px;
  }
  #hint {
    position:fixed; bottom:38px; left:50%; transform:translateX(-50%); z-index:30;
    font-family:'Baloo 2',cursive; font-weight:800; color:#fff; font-size:22px;
    background:rgba(0,0,0,.4); backdrop-filter:blur(6px); padding:12px 26px;
    border-radius:40px; display:none; text-align:center; animation:pulse 1.6s infinite;
    pointer-events:none; max-width:88vw;
  }
  @keyframes pulse { 0%,100%{transform:translateX(-50%) scale(1)} 50%{transform:translateX(-50%) scale(1.06)} }

  /* ---------- Monster ---------- */
  .monster {
    position:fixed; z-index:20; width:120px; height:120px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; will-change:transform; touch-action:manipulation;
  }
  .monster .body { font-size:96px; filter:drop-shadow(0 6px 10px rgba(0,0,0,.45)); transition:transform .15s; }
  .monster.found .body { animation:caught .7s ease forwards; }
  @keyframes caught {
    0%{transform:scale(1) rotate(0)}
    30%{transform:scale(1.5) rotate(-12deg)}
    60%{transform:scale(1.3) rotate(12deg)}
    100%{transform:scale(0) rotate(40deg)}
  }

  /* peeking animation: slides out a bit then back */
  @keyframes peekTop {
    0%{transform:translateY(-130%)} 22%{transform:translateY(-25%)}
    55%{transform:translateY(-25%)} 100%{transform:translateY(-130%)} }
  @keyframes peekBottom {
    0%{transform:translateY(130%)} 22%{transform:translateY(25%)}
    55%{transform:translateY(25%)} 100%{transform:translateY(130%)} }
  @keyframes peekLeft {
    0%{transform:translateX(-130%)} 22%{transform:translateX(-25%)}
    55%{transform:translateX(-25%)} 100%{transform:translateX(-130%)} }
  @keyframes peekRight {
    0%{transform:translateX(130%)} 22%{transform:translateX(25%)}
    55%{transform:translateX(25%)} 100%{transform:translateX(130%)} }

  /* sparkle burst when found */
  .spark { position:fixed; z-index:25; font-size:40px; pointer-events:none; animation:fly .8s ease forwards; }
  @keyframes fly { 0%{transform:translate(0,0) scale(.4);opacity:1} 100%{transform:translate(var(--dx),var(--dy)) scale(1.4);opacity:0} }

  /* celebration toast */
  #yay {
    position:fixed; top:42%; left:50%; transform:translate(-50%,-50%) scale(0); z-index:40;
    font-family:'Baloo 2',cursive; font-weight:800; font-size:64px; color:#fff;
    text-shadow:0 4px 0 #ff3d96, 0 8px 20px rgba(0,0,0,.5); pointer-events:none;
  }
  #yay.show { animation:yay 1.1s ease forwards; }
  @keyframes yay {
    0%{transform:translate(-50%,-50%) scale(0) rotate(-15deg);opacity:0}
    35%{transform:translate(-50%,-50%) scale(1.25) rotate(8deg);opacity:1}
    70%{transform:translate(-50%,-50%) scale(1) rotate(-4deg);opacity:1}
    100%{transform:translate(-50%,-50%) scale(1.1) rotate(0);opacity:0}
  }

  #err {
    position:fixed; inset:0; z-index:60; display:none;
    flex-direction:column; align-items:center; justify-content:center; text-align:center;
    padding:40px; background:linear-gradient(160deg,#2a1a52,#160d33); color:#fff;
  }
  #err h2{ font-family:'Baloo 2'; font-size:30px; margin-bottom:14px; }
  #err p{ font-size:18px; max-width:320px; line-height:1.5; color:#ffe7fb; }
</style>
</head>
<body>

<video id="cam" autoplay playsinline muted></video>
<div id="scene"></div>

<div id="hud">
  <div id="score">⭐ <span id="scoreNum">0</span></div>
</div>
<div id="hint">Look around the room! 👀</div>
<div id="yay">YAY! 🎉</div>

<div id="start">
  <div class="emoji-row"><span>👾</span><span>👻</span><span>🐉</span><span>🦖</span></div>
  <h1>Monster<br>Peekaboo</h1>
  <p>Point the camera around the room. Cute monsters are hiding! Tap one when you spot it. 🫣</p>
  <button class="bigbtn" id="go">Let's Play!</button>
</div>

<div id="err">
  <h2>Camera needed 📷</h2>
  <p id="errmsg">This game needs the camera to find monsters. Please allow camera access and reload.</p>
</div>

<script>
const MONSTERS = ['👾','👻','🐉','🦖','🐙','👽','🦕','🐲','🦑','🧟','🤖','🐡'];
const TAILS    = ['🪱','〰️','🟣','🟢'];
const video = document.getElementById('cam');
const scene = document.getElementById('scene');
const hint  = document.getElementById('hint');
const yay   = document.getElementById('yay');
const scoreNum = document.getElementById('scoreNum');
let score = 0;
let activeTimers = [];

// ---- Sound (gentle, generated, no files) ----
let actx;
function beep(freq, dur, type='sine', vol=0.25){
  try{
    if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type; o.frequency.value=freq; o.connect(g); g.connect(actx.destination);
    g.gain.setValueAtTime(vol, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+dur);
    o.start(); o.stop(actx.currentTime+dur);
  }catch(e){}
}
function peekSound(){ beep(520,0.12,'triangle',0.18); }
function foundSound(){
  beep(660,0.12,'sine',0.3);
  setTimeout(()=>beep(880,0.12,'sine',0.3),120);
  setTimeout(()=>beep(1175,0.22,'sine',0.3),240);
}

document.getElementById('go').addEventListener('click', startGame);

async function startGame(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ideal:'environment'} }, audio:false
    });
    video.srcObject = stream;
    document.getElementById('start').style.display='none';
    document.getElementById('hud').style.display='flex';
    hint.style.display='block';
    // unlock audio
    beep(440,0.05,'sine',0.05);
    loop();
  }catch(e){
    document.getElementById('start').style.display='none';
    document.getElementById('err').style.display='flex';
    if(location.protocol!=='https:' && location.hostname!=='localhost'){
      document.getElementById('errmsg').textContent =
        'The camera only works on a secure (https) page. Open this file through a https link or localhost.';
    }
  }
}

const EDGES = ['top','bottom','left','right'];
function spawnMonster(){
  const edge = EDGES[Math.floor(Math.random()*EDGES.length)];
  const emoji = MONSTERS[Math.floor(Math.random()*MONSTERS.length)];
  const m = document.createElement('div');
  m.className='monster';

  // position along the chosen edge
  const vw=window.innerWidth, vh=window.innerHeight, size=120;
  let left, top, anim;
  if(edge==='top'){ left=rand(10,vw-size-10); top=0; anim='peekTop'; }
  else if(edge==='bottom'){ left=rand(10,vw-size-10); top=vh-size; anim='peekBottom'; }
  else if(edge==='left'){ left=0; top=rand(80,vh-size-40); anim='peekLeft'; }
  else { left=vw-size; top=rand(80,vh-size-40); anim='peekRight'; }

  m.style.left=left+'px'; m.style.top=top+'px';
  m.innerHTML = `<div class="body">${emoji}</div>`;
  m.style.animation = `${anim} ${rand(3200,4200)|0}ms ease-in-out`;

  scene.appendChild(m);
  peekSound();
  hint.textContent = peekHint(edge);

  let caught=false;
  m.addEventListener('click', ()=>{ if(!caught){ caught=true; found(m, emoji); } });
  m.addEventListener('touchstart', (ev)=>{ ev.preventDefault(); if(!caught){ caught=true; found(m, emoji); } }, {passive:false});

  // remove after it hides again
  setTimeout(()=>{ if(!caught) m.remove(); }, 4300);
}

function peekHint(edge){
  const where = { top:'up high', bottom:'down low', left:'to the left', right:'to the right' }[edge];
  const opts = [`A monster is ${where}! 👀`, `Look ${where}! 🫣`, `Something moved ${where}! ✨`];
  return opts[Math.floor(Math.random()*opts.length)];
}

function found(m, emoji){
  foundSound();
  m.classList.add('found');
  m.style.animation='none'; // stop the peek slide so it stays to be caught
  m.querySelector('.body').classList.add('found');
  // sparkles
  const r = m.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  for(let i=0;i<8;i++){
    const s=document.createElement('div');
    s.className='spark'; s.textContent=['✨','⭐','💫','🌟'][i%4];
    const ang=(Math.PI*2/8)*i, dist=90+Math.random()*40;
    s.style.left=cx+'px'; s.style.top=cy+'px';
    s.style.setProperty('--dx',(Math.cos(ang)*dist)+'px');
    s.style.setProperty('--dy',(Math.sin(ang)*dist)+'px');
    scene.appendChild(s);
    setTimeout(()=>s.remove(),800);
  }
  score++; scoreNum.textContent=score;
  yay.textContent = ['YAY! 🎉','Got it! 🌈','Wheee! ⭐','Found you! 💖'][Math.floor(Math.random()*4)];
  yay.classList.remove('show'); void yay.offsetWidth; yay.classList.add('show');
  hint.textContent='Find another one! 🔎';
  setTimeout(()=>m.remove(),750);
}

function rand(a,b){ return a+Math.random()*(b-a); }

// keep spawning monsters at a calm, toddler-friendly pace
function loop(){
  spawnMonster();
  const next = rand(2600, 4200); // never overwhelming
  activeTimers.push(setTimeout(loop, next));
}

window.addEventListener('resize', ()=>{ /* monsters reposition on next spawn */ });
</script>
</body>
</html>
